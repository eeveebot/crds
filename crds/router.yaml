apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: routers.eevee.bot
spec:
  group: eevee.bot
  names:
    kind: router
    plural: routers
    singular: router
    shortNames:
      - router
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              description: routerSpec defines the desired state of router
              properties:
                size:
                  type: number
                  description: |-
                    Size defines the number of router instances
                    Default: 1
                image:
                  type: string
                  description: |-
                    Image defines the container image to use
                    Default: "ghcr.io/eeveebot/router:latest"
                pullPolicy:
                  type: string
                  description: |-
                    PullPolicy defines the image pull policy to use
                    Default: "Always"
                metrics:
                  type: boolean
                  description: |-
                    Metrics defines whether to enable metrics or not
                    Default: false
                metricsPort:
                  type: number
                  description: |-
                    MetricsPort defines the port to expose metrics on
                    Default: 8080
                moduleConfig:
                  type: object
                  properties: {}
                  description: >-
                    ModuleConfig is a passthrough field for arbitrary YAML
                    configuration

                    that will be passed directly to the router
              required: []
            status:
              type: object
              description: routerStatus defines the observed state of router
              properties:
                conditions:
                  type: array
                  description: Conditions describing the current state
                  items:
                    type: object
                    description: Condition contains details for one aspect of the current state of
                      this API Resource.
                    properties: {}
                    required: []
      subresources:
        status: {}
