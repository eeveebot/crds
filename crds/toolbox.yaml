apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: toolboxes.eevee.bot
spec:
  group: eevee.bot
  names:
    kind: toolbox
    plural: toolboxes
    singular: toolbox
    shortNames:
      - toolbox
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              description: toolboxSpec defines the desired state of toolbox
              properties:
                size:
                  type: number
                  description: Size defines the number of toolbox instances
                containerImage:
                  type: string
                  description: |-
                    ContainerImage defines the container image to use
                    Default: "ghcr.io/eeveebot/cli:latest"
                pullPolicy:
                  type: string
                  description: |-
                    PullPolicy defines the image pull policy to use
                    Default: "Always"
                metrics:
                  type: boolean
                  description: |-
                    Metrics defines whether to enable metrics or not
                    Default: false
                ipcConfig:
                  type: string
                  description: IPC configuration name
              required: []
            status:
              type: object
              description: toolboxStatus defines the observed state of toolbox
              properties:
                conditions:
                  type: array
                  description: Conditions describing the current state
                  items:
                    type: object
                    description: Condition contains details for one aspect of the current state of
                      this API Resource.
                    properties: {}
                    required: []
      subresources:
        status: {}
